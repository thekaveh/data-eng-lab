# Declarative inputs for architecture-diagram generation (Task 11) + checks.
# Every diagram is a landscape SVG written to docs/architectures/<output>.
# Count: overview + lakehouse + 19 scenarios + 2 apps = 23 entries.
orientation: landscape
diagrams:
  - name: overview
    title: "Full-stack lakehouse"
    kind: overview
    output: overview.svg
    sources:
      - docs/index.md
      - docs/lakehouse.md
  - name: lakehouse
    title: "Medallion flow"
    kind: lakehouse
    output: lakehouse.svg
    sources:
      - docs/lakehouse.md

