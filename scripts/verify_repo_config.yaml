# Single edit point for repo-structure verification.
scenario_name_regex: "^[a-z0-9_]+-[a-z0-9_]+-[a-z0-9_]+-[a-z0-9_]+$"
scenario_required_files:
  - README.md
  - zeppelin/notebook.zpln
  - jupyter/notebook.ipynb
scenario_readme_sections:
  - "1. Purpose"
  - "2. Data Model"
  - "3. Architecture"
  - "4. Notebooks"
  - "5. Orchestration"
  - "6. Usage"
  - "7. Dependencies"
  - "8. Known Issues & Caveats"
notebook_sections:
  - "1. Overview"
  - "2. Setup"
  - "3. Read"
  - "4. Transform"
  - "5. Write"
  - "6. Verify"
spark_app_required_files:
  - pom.xml
  - src/main/scala
  - Jenkinsfile
  - dag.py
