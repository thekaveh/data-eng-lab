<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="600" fill="#0a0f1f"/>
        <rect width="1280" height="600" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">table_maintenance — NYC Taxi (Spark → Iceberg)</text>
        <text x="640" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">Three Iceberg maintenance procedures: compact files, expire snapshots, remove orphans</text>

        <!-- ================= STAGE 1: BRONZE SOURCE ================= -->
        <rect x="40" y="110" width="200" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="140" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Source — Bronze</text>

        <rect x="60" y="160" width="160" height="260" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="140" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">BRONZE</text>
        <text x="140" y="214" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">lakehouse.bronze.</text>
        <text x="140" y="230" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">nyc_taxi_trips</text>
        <line x1="75" y1="250" x2="205" y2="250" stroke="#334155" stroke-width="1"/>
        <text x="140" y="272" fill="#94a3b8" font-size="9" text-anchor="middle">read-only source</text>
        <text x="140" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">full trip history</text>
        <text x="140" y="376" fill="#22d3ee" font-size="9" text-anchor="middle">CTAS + INSERT</text>

        <!-- ================= STAGE 2: TARGET TABLE (fragmented) ================= -->
        <rect x="300" y="110" width="260" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="430" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Target — Silver</text>

        <rect x="320" y="160" width="220" height="260" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="430" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">SILVER</text>
        <text x="430" y="214" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">lakehouse.silver.</text>
        <text x="430" y="230" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">nyc_taxi_tm</text>
        <line x1="335" y1="250" x2="525" y2="250" stroke="#334155" stroke-width="1"/>
        <text x="430" y="272" fill="#94a3b8" font-size="9" text-anchor="middle">CREATE TABLE AS SELECT *</text>
        <text x="430" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">+ INSERT (pcount &gt; 3)</text>
        <text x="430" y="312" fill="#ffffff" font-size="9" text-anchor="middle">→ many small files</text>
        <text x="430" y="328" fill="#ffffff" font-size="9" text-anchor="middle">→ multiple snapshots</text>
        <text x="430" y="360" fill="#22d3ee" font-size="9" text-anchor="middle">.files / .snapshots</text>
        <text x="430" y="376" fill="#94a3b8" font-size="9" text-anchor="middle">before: N files, M snaps</text>
        <text x="430" y="400" fill="#22d3ee" font-size="9" text-anchor="middle">CALL lakehouse.system.*</text>

        <!-- ================= STAGE 3: 3 MAINTENANCE OPS ================= -->
        <rect x="620" y="110" width="380" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="810" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Maintenance Procedures</text>

        <!-- op 1: rewrite_data_files -->
        <rect x="640" y="148" width="340" height="92" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="810" y="170" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">① COMPACTION</text>
        <text x="810" y="190" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">rewrite_data_files</text>
        <line x1="655" y1="200" x2="965" y2="200" stroke="#334155" stroke-width="1"/>
        <text x="810" y="218" fill="#94a3b8" font-size="9" text-anchor="middle">target-file-size-bytes = 134217728 (128 MiB)</text>
        <text x="810" y="233" fill="#94a3b8" font-size="9" text-anchor="middle">small files → fewer larger files (faster reads)</text>

        <!-- op 2: expire_snapshots -->
        <rect x="640" y="252" width="340" height="92" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="810" y="274" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">② SNAPSHOT EXPIRY</text>
        <text x="810" y="294" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">expire_snapshots</text>
        <line x1="655" y1="304" x2="965" y2="304" stroke="#334155" stroke-width="1"/>
        <text x="810" y="322" fill="#94a3b8" font-size="9" text-anchor="middle">older_than = current_timestamp()</text>
        <text x="810" y="337" fill="#94a3b8" font-size="9" text-anchor="middle">retain_last = 1 (keeps latest only)</text>

        <!-- op 3: remove_orphan_files -->
        <rect x="640" y="356" width="340" height="74" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="810" y="378" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">③ ORPHAN CLEANUP</text>
        <text x="810" y="398" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">remove_orphan_files</text>
        <line x1="655" y1="408" x2="965" y2="408" stroke="#334155" stroke-width="1"/>
        <text x="810" y="424" fill="#94a3b8" font-size="9" text-anchor="middle">deletes data files unreferenced by metadata</text>

        <!-- ================= STAGE 4: RESULT ================= -->
        <rect x="1060" y="110" width="180" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1150" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Result — Healthy</text>

        <rect x="1078" y="160" width="144" height="260" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="1150" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">OPTIMIZED</text>
        <text x="1150" y="214" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">silver.</text>
        <text x="1150" y="230" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">nyc_taxi_tm</text>
        <line x1="1088" y1="250" x2="1212" y2="250" stroke="#334155" stroke-width="1"/>
        <text x="1150" y="272" fill="#94a3b8" font-size="9" text-anchor="middle">after:</text>
        <text x="1150" y="292" fill="#ffffff" font-size="9" text-anchor="middle">fewer files</text>
        <text x="1150" y="308" fill="#ffffff" font-size="9" text-anchor="middle">1 snapshot</text>
        <text x="1150" y="324" fill="#ffffff" font-size="9" text-anchor="middle">no orphans</text>
        <text x="1150" y="362" fill="#22d3ee" font-size="9" text-anchor="middle">storage reclaimed</text>
        <text x="1150" y="378" fill="#94a3b8" font-size="9" text-anchor="middle">query perf restored</text>
        <text x="1150" y="400" fill="#22d3ee" font-size="9" text-anchor="middle">catalog: lakehouse</text>

        <!-- ================= CONNECTORS ================= -->
        <!-- Bronze -> target -->
        <line x1="220" y1="290" x2="318" y2="290" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="269" y="282" fill="#22d3ee" font-size="9" text-anchor="middle">copy</text>

        <!-- target -> op1 -->
        <line x1="540" y1="250" x2="638" y2="194" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <!-- target -> op2 -->
        <line x1="540" y1="290" x2="638" y2="298" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <!-- target -> op3 -->
        <line x1="540" y1="330" x2="638" y2="392" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="588" y="226" fill="#22d3ee" font-size="9" text-anchor="middle">①</text>
        <text x="588" y="290" fill="#22d3ee" font-size="9" text-anchor="middle">②</text>
        <text x="588" y="368" fill="#22d3ee" font-size="9" text-anchor="middle">③</text>

        <!-- ops -> result -->
        <path d="M 980 194 C 1020 194 1030 270 1076 290" fill="none" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arrowhead)"/>
        <path d="M 980 298 C 1020 298 1030 296 1076 296" fill="none" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arrowhead)"/>
        <path d="M 980 392 C 1020 392 1030 320 1076 306" fill="none" stroke="#22d3ee" stroke-width="1.3" marker-end="url(#arrowhead)"/>
        <text x="1028" y="262" fill="#22d3ee" font-size="9" text-anchor="middle">reclaim</text>

        <!-- Orchestrator + verify strip -->
        <rect x="40" y="470" width="1200" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="70" y="496" fill="#22d3ee" font-size="11" font-weight="600">Orchestration</text>
        <text x="70" y="516" fill="#94a3b8" font-size="9">Airflow DAG: table_maintenance_nyc_taxi (@daily) · placeholder until productionized (Phase-3)</text>
        <text x="70" y="534" fill="#94a3b8" font-size="9">runs against a sandbox silver copy; bronze never mutated</text>
        <text x="430" y="496" fill="#22d3ee" font-size="11" font-weight="600">Procedures</text>
        <text x="430" y="516" fill="#94a3b8" font-size="9">rewrite_data_files → expire_snapshots → remove_orphan_files</text>
        <text x="430" y="534" fill="#94a3b8" font-size="9">all via CALL lakehouse.system.* (Iceberg REST iceberg-rest:8181)</text>
        <text x="900" y="496" fill="#22d3ee" font-size="11" font-weight="600">Verify</text>
        <text x="900" y="516" fill="#94a3b8" font-size="9">count(*) AS snapshots FROM .snapshots</text>
        <text x="900" y="534" fill="#94a3b8" font-size="9">count(*) AS files FROM .files</text>
        <text x="70" y="556" fill="#22d3ee" font-size="10" font-weight="600">Order:</text>
        <text x="118" y="556" fill="#94a3b8" font-size="9">compact first (rewrites files), then expire snapshots (unrefs old files), then remove orphans (deletes them)</text>
      </svg>
