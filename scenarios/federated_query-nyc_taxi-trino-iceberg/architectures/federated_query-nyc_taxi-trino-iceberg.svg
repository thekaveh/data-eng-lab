<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowhead-spark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="600" fill="#0a0f1f"/>
        <rect width="1280" height="600" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="38" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">federated query — NYC Taxi via Trino (same Iceberg catalog as Spark)</text>
        <text x="640" y="60" fill="#94a3b8" font-size="12" text-anchor="middle">SQL-only daily aggregate: bronze.nyc_taxi_trips → gold.nyc_taxi_daily_trino — no Spark cluster involved</text>

        <!-- ================= BRONZE INPUT (Spark-written) ================= -->
        <rect x="30" y="120" width="280" height="360" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="170" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Bronze (written by Spark)</text>

        <rect x="50" y="190" width="240" height="240" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="170" y="214" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">BRONZE</text>
        <text x="170" y="238" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">nyc_taxi_trips</text>
        <text x="170" y="256" fill="#94a3b8" font-size="9" text-anchor="middle">lakehouse.bronze.nyc_taxi_trips</text>
        <line x1="70" y1="268" x2="270" y2="268" stroke="#334155" stroke-width="1"/>
        <text x="170" y="288" fill="#ffffff" font-size="9" text-anchor="middle">trip_date · trip_distance</text>
        <text x="170" y="304" fill="#ffffff" font-size="9" text-anchor="middle">fare_amount · total_amount</text>
        <text x="170" y="320" fill="#ffffff" font-size="9" text-anchor="middle">tpep_pickup_datetime</text>
        <text x="170" y="336" fill="#ffffff" font-size="9" text-anchor="middle">PULocationID · DOLocationID</text>
        <text x="170" y="372" fill="#94a3b8" font-size="9" text-anchor="middle">populated by</text>
        <text x="170" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">batch_ingest (Spark)</text>
        <text x="170" y="414" fill="#22d3ee" font-size="9" text-anchor="middle">SELECT * … LIMIT 10</text>

        <!-- ================= TRINO (emphasized) ================= -->
        <rect x="350" y="120" width="540" height="360" rx="14" fill="rgba(34, 211, 238, 0.06)" stroke="#22d3ee" stroke-width="2"/>
        <text x="620" y="146" fill="#22d3ee" font-size="14" font-weight="700" text-anchor="middle">TRINO — federated SQL engine (reads Iceberg directly)</text>

        <rect x="380" y="168" width="480" height="64" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="620" y="190" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Trino coordinator · trino:8080</text>
        <text x="620" y="208" fill="#94a3b8" font-size="9" text-anchor="middle">connect(host='trino', port=8080, user='atlas', catalog='lakehouse')</text>
        <text x="620" y="224" fill="#22d3ee" font-size="9" text-anchor="middle">catalog=lakehouse → Iceberg connector (same REST catalog as Spark)</text>

        <!-- daily aggregate SQL -->
        <rect x="380" y="248" width="480" height="134" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="620" y="270" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">Daily aggregate (ANSI SQL)</text>
        <line x1="400" y1="280" x2="840" y2="280" stroke="#334155" stroke-width="1"/>
        <text x="620" y="300" fill="#ffffff" font-size="10" text-anchor="middle">SELECT trip_date,</text>
        <text x="620" y="316" fill="#ffffff" font-size="10" text-anchor="middle">       count(*) AS trips, avg(fare_amount) AS avg_fare</text>
        <text x="620" y="332" fill="#ffffff" font-size="10" text-anchor="middle">FROM lakehouse.bronze.nyc_taxi_trips</text>
        <text x="620" y="348" fill="#f59e0b" font-size="10" text-anchor="middle">GROUP BY trip_date ORDER BY trip_date</text>
        <text x="620" y="368" fill="#94a3b8" font-size="9" text-anchor="middle">pushed-down aggregation over Iceberg splits</text>

        <!-- CTAS write -->
        <rect x="380" y="396" width="480" height="62" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="620" y="418" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">CREATE TABLE AS SELECT → daily summary</text>
        <text x="620" y="438" fill="#94a3b8" font-size="9" text-anchor="middle">CREATE TABLE IF NOT EXISTS lakehouse.gold.nyc_taxi_daily_trino AS SELECT …</text>

        <!-- ================= GOLD OUTPUT ================= -->
        <rect x="930" y="120" width="320" height="360" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1090" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Gold Output (Trino-written)</text>

        <rect x="950" y="220" width="280" height="180" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.8"/>
        <text x="1090" y="246" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">GOLD</text>
        <text x="1090" y="270" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">nyc_taxi_daily_trino</text>
        <text x="1090" y="288" fill="#94a3b8" font-size="9" text-anchor="middle">lakehouse.gold.nyc_taxi_daily_trino</text>
        <line x1="970" y1="300" x2="1210" y2="300" stroke="#334155" stroke-width="1"/>
        <text x="1090" y="322" fill="#ffffff" font-size="9" text-anchor="middle">trip_date</text>
        <text x="1090" y="340" fill="#ffffff" font-size="9" text-anchor="middle">trips (count)</text>
        <text x="1090" y="358" fill="#ffffff" font-size="9" text-anchor="middle">avg_fare</text>
        <text x="1090" y="384" fill="#22d3ee" font-size="9" text-anchor="middle">ad-hoc BI / SQL consumption</text>

        <!-- ================= CONNECTORS ================= -->
        <line x1="290" y1="310" x2="378" y2="300" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead)"/>
        <text x="334" y="290" fill="#22d3ee" font-size="9" text-anchor="middle">Trino reads</text>

        <line x1="862" y1="427" x2="948" y2="310" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowhead)"/>
        <text x="908" y="386" fill="#22d3ee" font-size="9" text-anchor="middle">CTAS write</text>

        <!-- shared catalog note (the key concept) -->
        <rect x="30" y="500" width="860" height="60" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
        <text x="55" y="522" fill="#22d3ee" font-size="11" font-weight="600">One catalog, two engines — federated lakehouse</text>
        <text x="55" y="540" fill="#94a3b8" font-size="9">Spark writes bronze via Iceberg REST (iceberg-rest:8181); Trino reads the SAME catalog via the lakehouse Iceberg connector — no data copy.</text>
        <text x="55" y="554" fill="#94a3b8" font-size="9">Notebooks: Zeppelin %trino + Jupyter trino client run identical SQL. Orchestration: EmptyOperator placeholder (TrinoOperator pending Atlas #268).</text>

        <rect x="930" y="500" width="320" height="60" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="1090" y="522" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">Verify</text>
        <text x="1090" y="540" fill="#94a3b8" font-size="9" text-anchor="middle">SELECT count(*) FROM lakehouse.gold.nyc_taxi_daily_trino</text>
      </svg>
