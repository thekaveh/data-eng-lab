<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="600" fill="#0a0f1f"/>
        <rect width="1280" height="600" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">schema_evolution — GH Archive (Spark → Iceberg)</text>
        <text x="640" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">In-place Iceberg schema evolution: ADD COLUMN + RENAME COLUMN are metadata-only (no data rewrite)</text>

        <!-- ================= STAGE 1: SAMPLE SEED ================= -->
        <rect x="40" y="120" width="230" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="155" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Seed — Inline</text>

        <rect x="65" y="160" width="180" height="270" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="155" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Inline Sample</text>
        <line x1="85" y1="204" x2="225" y2="204" stroke="#334155" stroke-width="1"/>
        <text x="155" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">INSERT VALUES</text>
        <text x="155" y="252" fill="#ffffff" font-size="10" text-anchor="middle">'1'</text>
        <text x="155" y="268" fill="#ffffff" font-size="10" text-anchor="middle">'PushEvent'</text>
        <text x="155" y="284" fill="#ffffff" font-size="10" text-anchor="middle">'octocat'</text>
        <text x="155" y="320" fill="#22d3ee" font-size="9" text-anchor="middle">no external source</text>
        <text x="155" y="336" fill="#94a3b8" font-size="9" text-anchor="middle">seeded in-notebook</text>
        <text x="155" y="396" fill="#22d3ee" font-size="9" text-anchor="middle">spark.sql(…)</text>

        <!-- ================= STAGE 2: INITIAL TABLE ================= -->
        <rect x="330" y="120" width="290" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="475" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Create — Silver (v1)</text>

        <rect x="355" y="160" width="240" height="270" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="475" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">SILVER v1</text>
        <text x="475" y="214" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">lakehouse.silver.</text>
        <text x="475" y="232" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">gh_events_se</text>
        <line x1="375" y1="252" x2="575" y2="252" stroke="#334155" stroke-width="1"/>
        <text x="475" y="276" fill="#ffffff" font-size="9" text-anchor="middle">CREATE TABLE … USING iceberg</text>
        <text x="475" y="306" fill="#94a3b8" font-size="9" text-anchor="middle">initial schema:</text>
        <text x="475" y="328" fill="#ffffff" font-size="10" text-anchor="middle">id : string</text>
        <text x="475" y="346" fill="#ffffff" font-size="10" text-anchor="middle">type : string</text>
        <text x="475" y="364" fill="#ffffff" font-size="10" text-anchor="middle">actor_login : string</text>
        <text x="475" y="400" fill="#22d3ee" font-size="9" text-anchor="middle">1 row committed (snapshot 1)</text>

        <!-- ================= STAGE 3: SCHEMA EVOLUTION ================= -->
        <rect x="680" y="120" width="300" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="830" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Evolve — ALTER TABLE</text>

        <!-- ADD COLUMN -->
        <rect x="700" y="160" width="260" height="125" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="830" y="184" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">METADATA-ONLY</text>
        <text x="830" y="206" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">ADD COLUMN</text>
        <line x1="720" y1="218" x2="940" y2="218" stroke="#334155" stroke-width="1"/>
        <text x="830" y="238" fill="#ffffff" font-size="9" text-anchor="middle">ADD COLUMN repo_name string</text>
        <text x="830" y="260" fill="#94a3b8" font-size="9" text-anchor="middle">repo_name = NULL for</text>
        <text x="830" y="274" fill="#94a3b8" font-size="9" text-anchor="middle">existing rows (no rewrite)</text>

        <!-- RENAME COLUMN -->
        <rect x="700" y="300" width="260" height="125" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="830" y="324" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">METADATA-ONLY</text>
        <text x="830" y="346" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">RENAME COLUMN</text>
        <line x1="720" y1="358" x2="940" y2="358" stroke="#334155" stroke-width="1"/>
        <text x="830" y="378" fill="#ffffff" font-size="9" text-anchor="middle">RENAME COLUMN type</text>
        <text x="830" y="392" fill="#ffffff" font-size="9" text-anchor="middle">→ event_type</text>
        <text x="830" y="414" fill="#94a3b8" font-size="9" text-anchor="middle">field ID preserved</text>

        <!-- ================= STAGE 4: EVOLVED TABLE ================= -->
        <rect x="1040" y="120" width="200" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1140" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Result — Silver (v2)</text>

        <rect x="1055" y="160" width="170" height="270" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="1140" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">EVOLVED</text>
        <text x="1140" y="214" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">silver.</text>
        <text x="1140" y="230" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">gh_events_evolved</text>
        <line x1="1065" y1="248" x2="1215" y2="248" stroke="#334155" stroke-width="1"/>
        <text x="1140" y="270" fill="#94a3b8" font-size="9" text-anchor="middle">evolved schema:</text>
        <text x="1140" y="292" fill="#ffffff" font-size="9" text-anchor="middle">id</text>
        <text x="1140" y="308" fill="#22d3ee" font-size="9" text-anchor="middle">event_type  (renamed)</text>
        <text x="1140" y="324" fill="#ffffff" font-size="9" text-anchor="middle">actor_login</text>
        <text x="1140" y="340" fill="#22d3ee" font-size="9" text-anchor="middle">repo_name  (new)</text>
        <text x="1140" y="372" fill="#94a3b8" font-size="9" text-anchor="middle">row 1 → repo_name NULL</text>
        <text x="1140" y="388" fill="#94a3b8" font-size="9" text-anchor="middle">row 2 → 'linux'</text>
        <text x="1140" y="416" fill="#22d3ee" font-size="9" text-anchor="middle">snapshot 2</text>

        <!-- ================= CONNECTORS ================= -->
        <!-- Seed -> create -->
        <line x1="245" y1="295" x2="353" y2="295" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="299" y="287" fill="#22d3ee" font-size="9" text-anchor="middle">INSERT seed</text>

        <!-- create -> ALTER -->
        <line x1="595" y1="295" x2="698" y2="222" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="646" y="246" fill="#22d3ee" font-size="9" text-anchor="middle">ALTER (add)</text>

        <line x1="595" y1="295" x2="698" y2="362" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="646" y="352" fill="#22d3ee" font-size="9" text-anchor="middle">ALTER (rename)</text>

        <!-- ALTER -> evolved -->
        <path d="M 960 222 C 1000 222 1010 270 1053 285" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 960 362 C 1000 362 1010 314 1053 300" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="1010" y="252" fill="#22d3ee" font-size="9" text-anchor="middle">commit</text>

        <!-- metadata-only emphasis banner -->
        <rect x="680" y="460" width="300" height="34" rx="6" fill="#0a0f1f" stroke="#22d3ee" stroke-width="1"/>
        <text x="830" y="482" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">metadata-only · zero data files rewritten</text>

        <!-- Orchestrator + verify strip -->
        <rect x="40" y="508" width="1200" height="72" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="70" y="534" fill="#22d3ee" font-size="11" font-weight="600">Orchestration</text>
        <text x="70" y="554" fill="#94a3b8" font-size="9">Airflow DAG: schema_evolution_gh_archive (@daily) · placeholder until productionized</text>
        <text x="430" y="534" fill="#22d3ee" font-size="11" font-weight="600">Notebooks</text>
        <text x="430" y="554" fill="#94a3b8" font-size="9">PySpark (Jupyter) · Scala (Zeppelin) · Spark Connect sc://spark-connect:15002</text>
        <text x="900" y="534" fill="#22d3ee" font-size="11" font-weight="600">Verify</text>
        <text x="900" y="554" fill="#94a3b8" font-size="9">SELECT id, event_type, actor_login, repo_name ORDER BY id</text>
      </svg>
