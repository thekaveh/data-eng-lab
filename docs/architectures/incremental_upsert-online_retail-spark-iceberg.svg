<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="560" fill="#0a0f1f"/>
        <rect width="1280" height="560" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">incremental_upsert — Online Retail (Spark MERGE INTO → Iceberg Silver)</text>
        <text x="640" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">A change-set batch is merged on (invoice, stock_code); re-applying the same batch is idempotent — no duplication</text>

        <!-- ================= STAGE 1: SEED ================= -->
        <rect x="40" y="120" width="230" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="155" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Seed — Inline</text>

        <rect x="60" y="160" width="190" height="270" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="155" y="188" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">CREATE TABLE</text>
        <text x="155" y="208" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">silver.online_retail</text>
        <line x1="80" y1="224" x2="230" y2="224" stroke="#334155" stroke-width="1"/>
        <text x="155" y="244" fill="#94a3b8" font-size="9" text-anchor="middle">invoice    string</text>
        <text x="155" y="260" fill="#94a3b8" font-size="9" text-anchor="middle">stock_code string</text>
        <text x="155" y="276" fill="#94a3b8" font-size="9" text-anchor="middle">quantity   int</text>
        <text x="155" y="292" fill="#94a3b8" font-size="9" text-anchor="middle">price      double</text>
        <line x1="80" y1="306" x2="230" y2="306" stroke="#334155" stroke-width="1"/>
        <text x="155" y="326" fill="#ffffff" font-size="9" text-anchor="middle">INSERT initial rows</text>
        <text x="155" y="346" fill="#ffffff" font-size="9" text-anchor="middle">A1 · SKU1 · 5  · 2.0</text>
        <text x="155" y="362" fill="#ffffff" font-size="9" text-anchor="middle">A2 · SKU2 · 3  · 4.0</text>
        <text x="155" y="402" fill="#22d3ee" font-size="9" text-anchor="middle">no external source</text>

        <!-- ================= STAGE 2: CHANGE-SET BATCH ================= -->
        <rect x="320" y="120" width="230" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="435" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Change-Set Batch</text>

        <rect x="340" y="160" width="190" height="270" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="435" y="188" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">TEMP VIEW</text>
        <text x="435" y="208" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">online_retail_updates</text>
        <line x1="360" y1="224" x2="510" y2="224" stroke="#1e293b" stroke-width="1"/>
        <text x="435" y="246" fill="#94a3b8" font-size="9" text-anchor="middle">VALUES (...)</text>
        <text x="435" y="272" fill="#ffffff" font-size="9" text-anchor="middle">A1 · SKU1 · 10 · 2.0</text>
        <text x="435" y="288" fill="#94a3b8" font-size="8" text-anchor="middle">(match · update qty)</text>
        <line x1="360" y1="302" x2="510" y2="302" stroke="#1e293b" stroke-width="1"/>
        <text x="435" y="324" fill="#ffffff" font-size="9" text-anchor="middle">A3 · SKU3 · 1  · 9.0</text>
        <text x="435" y="340" fill="#94a3b8" font-size="8" text-anchor="middle">(no match · insert)</text>
        <text x="435" y="378" fill="#22d3ee" font-size="9" text-anchor="middle">replayable batch</text>
        <text x="435" y="394" fill="#22d3ee" font-size="9" text-anchor="middle">deterministic input</text>

        <!-- ================= STAGE 3: MERGE INTO ================= -->
        <rect x="600" y="120" width="320" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="760" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Upsert — MERGE INTO</text>

        <rect x="620" y="160" width="280" height="200" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="760" y="184" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">MERGE INTO silver.online_retail t</text>
        <text x="760" y="202" fill="#ffffff" font-size="11" text-anchor="middle">USING online_retail_updates s</text>
        <line x1="640" y1="216" x2="880" y2="216" stroke="#334155" stroke-width="1"/>
        <text x="760" y="238" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">ON t.invoice = s.invoice</text>
        <text x="760" y="256" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">AND t.stock_code = s.stock_code</text>
        <line x1="640" y1="270" x2="880" y2="270" stroke="#334155" stroke-width="1"/>
        <text x="760" y="292" fill="#ffffff" font-size="10" text-anchor="middle">WHEN MATCHED     → UPDATE quantity</text>
        <text x="760" y="312" fill="#ffffff" font-size="10" text-anchor="middle">WHEN NOT MATCHED → INSERT *</text>
        <text x="760" y="342" fill="#22d3ee" font-size="9" text-anchor="middle">Iceberg row-level MERGE</text>

        <!-- idempotency banner -->
        <rect x="620" y="372" width="280" height="58" rx="6" fill="#0a0f1f" stroke="#fb923c" stroke-width="1"/>
        <text x="760" y="392" fill="#fb923c" font-size="10" font-weight="700" text-anchor="middle">IDEMPOTENT</text>
        <text x="760" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">same batch merged twice</text>
        <text x="760" y="424" fill="#94a3b8" font-size="9" text-anchor="middle">→ identical table state</text>

        <!-- ================= STAGE 4: RESULT ================= -->
        <rect x="970" y="120" width="270" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1105" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Result — Silver</text>

        <rect x="990" y="160" width="230" height="270" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="1105" y="184" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">SILVER</text>
        <text x="1105" y="206" fill="#22d3ee" font-size="9" text-anchor="middle">silver.</text>
        <text x="1105" y="220" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">online_retail</text>
        <line x1="1010" y1="236" x2="1200" y2="236" stroke="#1e293b" stroke-width="1"/>

        <text x="1105" y="258" fill="#ffffff" font-size="9" text-anchor="middle">A1 · SKU1 · 10 · 2.0</text>
        <text x="1105" y="272" fill="#fb923c" font-size="8" text-anchor="middle">qty updated 5 → 10</text>

        <text x="1105" y="298" fill="#ffffff" font-size="9" text-anchor="middle">A2 · SKU2 · 3  · 4.0</text>
        <text x="1105" y="312" fill="#94a3b8" font-size="8" text-anchor="middle">unchanged</text>

        <text x="1105" y="338" fill="#22d3ee" font-size="9" text-anchor="middle">A3 · SKU3 · 1  · 9.0</text>
        <text x="1105" y="352" fill="#22d3ee" font-size="8" text-anchor="middle">inserted</text>

        <line x1="1010" y1="368" x2="1200" y2="368" stroke="#1e293b" stroke-width="1"/>
        <text x="1105" y="390" fill="#fb923c" font-size="9" text-anchor="middle">re-run MERGE → no-op</text>
        <text x="1105" y="406" fill="#94a3b8" font-size="9" text-anchor="middle">(same 3 rows, no dups)</text>

        <!-- ================= CONNECTORS ================= -->
        <!-- seed -> merge -->
        <line x1="270" y1="290" x2="618" y2="250" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="430" y="258" fill="#22d3ee" font-size="9" text-anchor="middle">target t</text>

        <!-- change-set -> merge -->
        <line x1="530" y1="290" x2="618" y2="290" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="574" y="282" fill="#22d3ee" font-size="9" text-anchor="middle">source s</text>

        <!-- merge -> result -->
        <line x1="900" y1="260" x2="988" y2="290" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="944" y="266" fill="#22d3ee" font-size="9" text-anchor="middle">commit</text>

        <!-- idempotent replay loop -->
        <path d="M 1105 420 C 1105 448 760 448 760 432" fill="none" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
        <text x="932" y="446" fill="#fb923c" font-size="9" text-anchor="middle">replay batch (idempotent)</text>

        <!-- ================= ORCHESTRATOR STRIP ================= -->
        <rect x="40" y="468" width="1200" height="62" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="70" y="494" fill="#22d3ee" font-size="11" font-weight="600">Orchestration</text>
        <text x="70" y="514" fill="#94a3b8" font-size="9">Airflow DAG: incremental_upsert_online_retail (@hourly) · placeholder until productionized</text>
        <text x="560" y="494" fill="#22d3ee" font-size="11" font-weight="600">Runtime</text>
        <text x="560" y="514" fill="#94a3b8" font-size="9">PySpark (Jupyter) · Spark Connect sc://spark-connect:15002</text>
        <text x="930" y="494" fill="#22d3ee" font-size="11" font-weight="600">Verify</text>
        <text x="930" y="514" fill="#94a3b8" font-size="9">SELECT * ORDER BY invoice → stable</text>
      </svg>
