<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="560" fill="#0a0f1f"/>
        <rect width="1280" height="560" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">scd2 — Online Retail (Spark SQL → Iceberg Type-2 Dim)</text>
        <text x="640" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">A simulated segment change closes the old row (effective_to, is_current=false) and opens a new current row in dim_customer_scd2</text>

        <!-- ================= STAGE 1: SEED ================= -->
        <rect x="40" y="120" width="250" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="165" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Seed — Inline</text>

        <rect x="60" y="160" width="210" height="270" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="165" y="188" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">CREATE TABLE</text>
        <text x="165" y="208" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">gold.dim_customer_scd2</text>
        <line x1="80" y1="224" x2="250" y2="224" stroke="#334155" stroke-width="1"/>
        <text x="165" y="244" fill="#94a3b8" font-size="9" text-anchor="middle">customer_id   string</text>
        <text x="165" y="260" fill="#94a3b8" font-size="9" text-anchor="middle">segment       string</text>
        <text x="165" y="276" fill="#94a3b8" font-size="9" text-anchor="middle">effective_from ts</text>
        <text x="165" y="292" fill="#94a3b8" font-size="9" text-anchor="middle">effective_to   ts</text>
        <text x="165" y="308" fill="#94a3b8" font-size="9" text-anchor="middle">is_current    boolean</text>
        <line x1="80" y1="322" x2="250" y2="322" stroke="#334155" stroke-width="1"/>
        <text x="165" y="344" fill="#ffffff" font-size="9" text-anchor="middle">INSERT initial row</text>
        <text x="165" y="362" fill="#ffffff" font-size="10" text-anchor="middle">C1 · standard</text>
        <text x="165" y="378" fill="#ffffff" font-size="9" text-anchor="middle">2023-01-01 · NULL · true</text>
        <text x="165" y="412" fill="#22d3ee" font-size="9" text-anchor="middle">no external source</text>

        <!-- ================= STAGE 2: SCD2 TRANSITION ================= -->
        <rect x="350" y="120" width="420" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="560" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">SCD2 Transition — segment change</text>

        <!-- close old row -->
        <rect x="370" y="160" width="380" height="130" rx="8" fill="#334155" stroke="#fb923c" stroke-width="1.5"/>
        <text x="560" y="184" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">CLOSE OLD ROW</text>
        <text x="560" y="206" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">UPDATE dim_customer_scd2</text>
        <line x1="390" y1="220" x2="730" y2="220" stroke="#1e293b" stroke-width="1"/>
        <text x="560" y="242" fill="#ffffff" font-size="9" text-anchor="middle">SET effective_to = current_timestamp(),</text>
        <text x="560" y="258" fill="#ffffff" font-size="9" text-anchor="middle">    is_current   = false</text>
        <text x="560" y="278" fill="#94a3b8" font-size="9" text-anchor="middle">WHERE customer_id='C1' AND is_current=true</text>

        <!-- open new row -->
        <rect x="370" y="305" width="380" height="130" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="560" y="329" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">OPEN NEW ROW</text>
        <text x="560" y="351" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">INSERT INTO dim_customer_scd2</text>
        <line x1="390" y1="365" x2="730" y2="365" stroke="#1e293b" stroke-width="1"/>
        <text x="560" y="387" fill="#ffffff" font-size="9" text-anchor="middle">VALUES ('C1','premium',</text>
        <text x="560" y="403" fill="#ffffff" font-size="9" text-anchor="middle">        current_timestamp(), NULL, true)</text>
        <text x="560" y="423" fill="#94a3b8" font-size="9" text-anchor="middle">new current segment</text>

        <!-- ================= STAGE 3: CATALOG ================= -->
        <rect x="820" y="120" width="160" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="900" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Catalog</text>

        <rect x="840" y="210" width="120" height="150" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="900" y="238" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Iceberg</text>
        <text x="900" y="258" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">REST</text>
        <text x="900" y="286" fill="#94a3b8" font-size="9" text-anchor="middle">iceberg-rest:8181</text>
        <text x="900" y="326" fill="#22d3ee" font-size="9" text-anchor="middle">row-level</text>
        <text x="900" y="342" fill="#22d3ee" font-size="9" text-anchor="middle">UPDATE / INSERT</text>

        <!-- ================= STAGE 4: RESULT ================= -->
        <rect x="1040" y="120" width="200" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1140" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Result — Gold</text>

        <rect x="1055" y="160" width="170" height="270" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="1140" y="184" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">GOLD</text>
        <text x="1140" y="204" fill="#22d3ee" font-size="9" text-anchor="middle">gold.</text>
        <text x="1140" y="218" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">dim_customer_scd2</text>

        <!-- old row (closed) -->
        <rect x="1063" y="234" width="154" height="78" rx="6" fill="#0a0f1f" stroke="#fb923c" stroke-width="1"/>
        <text x="1140" y="252" fill="#fb923c" font-size="8" font-weight="700" text-anchor="middle">OLD · closed</text>
        <text x="1140" y="270" fill="#ffffff" font-size="9" text-anchor="middle">C1 · standard</text>
        <text x="1140" y="284" fill="#94a3b8" font-size="8" text-anchor="middle">from: 2023-01-01</text>
        <text x="1140" y="298" fill="#94a3b8" font-size="8" text-anchor="middle">to: &lt;now&gt; · is_current=false</text>

        <!-- new row (current) -->
        <rect x="1063" y="322" width="154" height="78" rx="6" fill="#0a0f1f" stroke="#22d3ee" stroke-width="1"/>
        <text x="1140" y="340" fill="#22d3ee" font-size="8" font-weight="700" text-anchor="middle">NEW · current</text>
        <text x="1140" y="358" fill="#ffffff" font-size="9" text-anchor="middle">C1 · premium</text>
        <text x="1140" y="372" fill="#94a3b8" font-size="8" text-anchor="middle">from: &lt;now&gt;</text>
        <text x="1140" y="386" fill="#94a3b8" font-size="8" text-anchor="middle">to: NULL · is_current=true</text>
        <text x="1140" y="416" fill="#22d3ee" font-size="9" text-anchor="middle">history preserved</text>

        <!-- ================= CONNECTORS ================= -->
        <!-- seed -> close -->
        <line x1="270" y1="290" x2="368" y2="225" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="319" y="250" fill="#22d3ee" font-size="9" text-anchor="middle">UPDATE</text>

        <!-- close -> open -->
        <line x1="560" y1="290" x2="560" y2="303" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- open -> catalog -->
        <line x1="750" y1="370" x2="838" y2="305" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="794" y="350" fill="#22d3ee" font-size="9" text-anchor="middle">commit</text>

        <!-- catalog -> result (both rows) -->
        <path d="M 960 285 C 1000 285 1010 273 1051 273" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 960 305 C 1000 305 1010 361 1051 361" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- ================= ORCHESTRATOR STRIP ================= -->
        <rect x="40" y="468" width="1200" height="62" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="70" y="494" fill="#22d3ee" font-size="11" font-weight="600">Orchestration</text>
        <text x="70" y="514" fill="#94a3b8" font-size="9">Airflow DAG: scd2_online_retail (@daily) · placeholder until productionized</text>
        <text x="560" y="494" fill="#22d3ee" font-size="11" font-weight="600">Runtime</text>
        <text x="560" y="514" fill="#94a3b8" font-size="9">PySpark (Jupyter) · Spark Connect sc://spark-connect:15002</text>
        <text x="930" y="494" fill="#22d3ee" font-size="11" font-weight="600">Verify</text>
        <text x="930" y="514" fill="#94a3b8" font-size="9">SELECT … ORDER BY effective_from</text>
      </svg>
