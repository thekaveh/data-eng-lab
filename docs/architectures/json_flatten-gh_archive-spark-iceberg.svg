<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="560" fill="#0a0f1f"/>
        <rect width="1280" height="560" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">json_flatten — GH Archive (Spark → Iceberg Silver)</text>
        <text x="640" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">Nested GitHub event JSON is flattened with dot-notation/get_json_object and a created_at cast into a tabular silver table</text>

        <!-- ================= STAGE 1: SOURCE (nested JSON) ================= -->
        <rect x="40" y="120" width="250" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="165" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Source — Landing</text>

        <rect x="60" y="160" width="210" height="270" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="165" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">S3 (MinIO)</text>
        <text x="165" y="210" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">s3a://landing/</text>
        <text x="165" y="226" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">gh_archive/*.json.gz</text>
        <line x1="80" y1="244" x2="250" y2="244" stroke="#334155" stroke-width="1"/>
        <text x="165" y="264" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">NESTED JSON (raw)</text>
        <text x="165" y="286" fill="#ffffff" font-size="10" text-anchor="middle">id          : string</text>
        <text x="165" y="304" fill="#ffffff" font-size="10" text-anchor="middle">type        : string</text>
        <text x="165" y="322" fill="#ffffff" font-size="10" text-anchor="middle">actor.login : string</text>
        <text x="165" y="340" fill="#ffffff" font-size="10" text-anchor="middle">repo.name   : string</text>
        <text x="165" y="358" fill="#ffffff" font-size="10" text-anchor="middle">created_at  : string</text>
        <text x="165" y="390" fill="#22d3ee" font-size="9" text-anchor="middle">spark.read.json(…)</text>
        <text x="165" y="406" fill="#94a3b8" font-size="9" text-anchor="middle">schema inferred</text>

        <!-- ================= STAGE 2: FLATTEN ================= -->
        <rect x="350" y="120" width="430" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="565" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Flatten — Spark select()</text>

        <rect x="370" y="160" width="390" height="200" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="565" y="184" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">raw.select( … )</text>
        <line x1="390" y1="198" x2="740" y2="198" stroke="#1e293b" stroke-width="1"/>
        <text x="565" y="220" fill="#ffffff" font-size="10" text-anchor="middle">col("id")</text>
        <text x="565" y="238" fill="#ffffff" font-size="10" text-anchor="middle">col("type")</text>
        <text x="565" y="258" fill="#fb923c" font-size="10" text-anchor="middle">col("actor.login").alias("actor_login")</text>
        <text x="565" y="278" fill="#fb923c" font-size="10" text-anchor="middle">col("repo.name").alias("repo_name")</text>
        <text x="565" y="298" fill="#fb923c" font-size="10" text-anchor="middle">col("created_at").cast("timestamp")</text>
        <text x="565" y="330" fill="#94a3b8" font-size="9" text-anchor="middle">dot-notation / get_json_object</text>
        <text x="565" y="346" fill="#94a3b8" font-size="9" text-anchor="middle">nested → flat columns</text>

        <!-- flatten mapping banner -->
        <rect x="370" y="372" width="390" height="58" rx="6" fill="#0a0f1f" stroke="#fb923c" stroke-width="1"/>
        <text x="565" y="392" fill="#fb923c" font-size="10" font-weight="700" text-anchor="middle">FIELD MAPPING</text>
        <text x="565" y="410" fill="#ffffff" font-size="9" text-anchor="middle">actor.login → actor_login  ·  repo.name → repo_name</text>
        <text x="565" y="424" fill="#ffffff" font-size="9" text-anchor="middle">created_at(string) → created_at(timestamp)</text>

        <!-- ================= STAGE 3: CATALOG ================= -->
        <rect x="830" y="120" width="160" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="910" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Catalog</text>

        <rect x="850" y="210" width="120" height="150" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="910" y="238" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">Iceberg</text>
        <text x="910" y="258" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">REST</text>
        <text x="910" y="286" fill="#94a3b8" font-size="9" text-anchor="middle">iceberg-rest:8181</text>
        <text x="910" y="326" fill="#22d3ee" font-size="9" text-anchor="middle">createOrReplace()</text>
        <text x="910" y="342" fill="#22d3ee" font-size="9" text-anchor="middle">USING iceberg</text>

        <!-- ================= STAGE 4: RESULT (flat silver) ================= -->
        <rect x="1040" y="120" width="200" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1140" y="142" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Result — Silver</text>

        <rect x="1055" y="160" width="170" height="270" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="1140" y="184" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">SILVER</text>
        <text x="1140" y="206" fill="#22d3ee" font-size="9" text-anchor="middle">silver.</text>
        <text x="1140" y="220" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">gh_events</text>
        <line x1="1065" y1="238" x2="1215" y2="238" stroke="#334155" stroke-width="1"/>
        <text x="1140" y="258" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">FLAT SCHEMA</text>
        <text x="1140" y="280" fill="#ffffff" font-size="9" text-anchor="middle">id           string</text>
        <text x="1140" y="298" fill="#ffffff" font-size="9" text-anchor="middle">type         string</text>
        <text x="1140" y="316" fill="#22d3ee" font-size="9" text-anchor="middle">actor_login  string</text>
        <text x="1140" y="334" fill="#22d3ee" font-size="9" text-anchor="middle">repo_name    string</text>
        <text x="1140" y="352" fill="#22d3ee" font-size="9" text-anchor="middle">created_at   timestamp</text>
        <text x="1140" y="384" fill="#94a3b8" font-size="9" text-anchor="middle">query-ready</text>
        <text x="1140" y="400" fill="#94a3b8" font-size="9" text-anchor="middle">GROUP BY type</text>

        <!-- ================= CONNECTORS ================= -->
        <!-- source -> flatten -->
        <line x1="270" y1="290" x2="368" y2="260" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="319" y="266" fill="#22d3ee" font-size="9" text-anchor="middle">raw DF</text>

        <!-- flatten -> catalog -->
        <line x1="760" y1="260" x2="848" y2="285" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="804" y="264" fill="#22d3ee" font-size="9" text-anchor="middle">writeTo</text>

        <!-- catalog -> result -->
        <line x1="970" y1="290" x2="1053" y2="290" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="1011" y="282" fill="#22d3ee" font-size="9" text-anchor="middle">commit</text>

        <!-- ================= ORCHESTRATOR STRIP ================= -->
        <rect x="40" y="468" width="1200" height="62" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="70" y="494" fill="#22d3ee" font-size="11" font-weight="600">Orchestration</text>
        <text x="70" y="514" fill="#94a3b8" font-size="9">Airflow DAG: json_flatten_gh_archive (@hourly) · placeholder until productionized</text>
        <text x="560" y="494" fill="#22d3ee" font-size="11" font-weight="600">Runtime</text>
        <text x="560" y="514" fill="#94a3b8" font-size="9">PySpark (Jupyter) · Spark Connect sc://spark-connect:15002</text>
        <text x="930" y="494" fill="#22d3ee" font-size="11" font-weight="600">Verify</text>
        <text x="930" y="514" fill="#94a3b8" font-size="9">GROUP BY type ORDER BY n DESC</text>
      </svg>
