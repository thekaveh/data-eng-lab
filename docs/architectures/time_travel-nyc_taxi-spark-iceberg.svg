<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" font-family="'JetBrains Mono', 'Courier New', monospace">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrowheadamber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background -->
        <rect width="1280" height="620" fill="#0a0f1f"/>
        <rect width="1280" height="620" fill="url(#grid)"/>

        <!-- Title -->
        <text x="640" y="40" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">time_travel — NYC Taxi (Spark → Iceberg)</text>
        <text x="640" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">Snapshot history enables VERSION AS OF time-travel, a WAP audit branch, and rollback-to-snapshot recovery</text>

        <!-- ================= STAGE 1: BRONZE SOURCE ================= -->
        <rect x="40" y="110" width="200" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="140" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Source — Bronze</text>

        <rect x="60" y="160" width="160" height="260" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="140" y="188" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">BRONZE</text>
        <text x="140" y="214" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">lakehouse.bronze.</text>
        <text x="140" y="230" fill="#22d3ee" font-size="10" font-weight="700" text-anchor="middle">nyc_taxi_trips</text>
        <line x1="75" y1="250" x2="205" y2="250" stroke="#334155" stroke-width="1"/>
        <text x="140" y="272" fill="#94a3b8" font-size="9" text-anchor="middle">read-only source</text>
        <text x="140" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">full trip history</text>
        <text x="140" y="376" fill="#22d3ee" font-size="9" text-anchor="middle">SELECT *</text>

        <!-- ================= STAGE 2: SANDBOX SILVER ================= -->
        <rect x="300" y="110" width="280" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="440" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Sandbox — Silver (writes)</text>

        <rect x="320" y="160" width="240" height="125" rx="8" fill="#334155" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="440" y="184" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">silver.nyc_taxi_tt</text>
        <line x1="335" y1="196" x2="545" y2="196" stroke="#334155" stroke-width="1"/>
        <text x="440" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">CREATE TABLE AS SELECT *</text>
        <text x="440" y="234" fill="#94a3b8" font-size="9" text-anchor="middle">→ snapshot 1</text>
        <text x="440" y="258" fill="#94a3b8" font-size="9" text-anchor="middle">INSERT … WHERE pcount &gt; 3</text>
        <text x="440" y="274" fill="#94a3b8" font-size="9" text-anchor="middle">→ snapshot 2</text>

        <rect x="320" y="300" width="240" height="120" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="440" y="324" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">SNAPSHOT TIMELINE</text>
        <line x1="335" y1="336" x2="545" y2="336" stroke="#334155" stroke-width="1"/>
        <text x="440" y="356" fill="#ffffff" font-size="9" text-anchor="middle">.history → committed_at</text>
        <text x="440" y="372" fill="#ffffff" font-size="9" text-anchor="middle">+ snapshot_id (ordered)</text>
        <text x="440" y="396" fill="#94a3b8" font-size="9" text-anchor="middle">catalog: iceberg-rest:8181</text>
        <text x="440" y="412" fill="#94a3b8" font-size="9" text-anchor="middle">data on lakehouse/ (MinIO)</text>

        <!-- ================= STAGE 3: TIME-TRAVEL READ ================= -->
        <rect x="640" y="110" width="280" height="155" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="780" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Time-Travel Read</text>

        <rect x="660" y="148" width="240" height="105" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="780" y="172" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">VERSION AS OF</text>
        <line x1="675" y1="184" x2="885" y2="184" stroke="#334155" stroke-width="1"/>
        <text x="780" y="204" fill="#94a3b8" font-size="9" text-anchor="middle">SELECT count(*) FROM</text>
        <text x="780" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">…nyc_taxi_tt</text>
        <text x="780" y="236" fill="#22d3ee" font-size="9" text-anchor="middle">VERSION AS OF &lt;snapshot_id&gt;</text>

        <!-- ================= STAGE 4: WAP BRANCH ================= -->
        <rect x="640" y="285" width="280" height="155" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="780" y="307" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Write-Audit-Publish</text>

        <rect x="660" y="323" width="240" height="105" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="780" y="347" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">WAP branch: audit</text>
        <line x1="675" y1="359" x2="885" y2="359" stroke="#334155" stroke-width="1"/>
        <text x="780" y="379" fill="#94a3b8" font-size="9" text-anchor="middle">ALTER TABLE … CREATE</text>
        <text x="780" y="393" fill="#94a3b8" font-size="9" text-anchor="middle">BRANCH IF NOT EXISTS audit</text>
        <text x="780" y="417" fill="#22d3ee" font-size="9" text-anchor="middle">isolated write → review → publish</text>

        <!-- ================= STAGE 5: ROLLBACK ================= -->
        <rect x="960" y="110" width="280" height="330" rx="12" fill="rgba(30, 41, 59, 0.35)" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="1100" y="132" fill="#22d3ee" font-size="12" font-weight="600" text-anchor="middle">Recovery — Rollback</text>

        <rect x="980" y="160" width="240" height="200" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="1100" y="184" fill="#f59e0b" font-size="10" font-weight="600" text-anchor="middle">ROLLBACK</text>
        <text x="1100" y="208" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">rollback_to_snapshot</text>
        <line x1="995" y1="222" x2="1205" y2="222" stroke="#334155" stroke-width="1"/>
        <text x="1100" y="244" fill="#94a3b8" font-size="9" text-anchor="middle">CALL lakehouse.system.</text>
        <text x="1100" y="260" fill="#94a3b8" font-size="9" text-anchor="middle">rollback_to_snapshot(</text>
        <text x="1100" y="276" fill="#ffffff" font-size="9" text-anchor="middle">'…nyc_taxi_tt',</text>
        <text x="1100" y="292" fill="#ffffff" font-size="9" text-anchor="middle">&lt;snapshot_id&gt;)</text>
        <text x="1100" y="322" fill="#94a3b8" font-size="9" text-anchor="middle">resets table head to a</text>
        <text x="1100" y="338" fill="#94a3b8" font-size="9" text-anchor="middle">prior committed snapshot</text>

        <rect x="980" y="376" width="240" height="44" rx="8" fill="#0a0f1f" stroke="#334155" stroke-width="1"/>
        <text x="1100" y="394" fill="#f59e0b" font-size="9" font-weight="600" text-anchor="middle">TEARDOWN</text>
        <text x="1100" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">sandbox dropped at end</text>

        <!-- ================= CONNECTORS ================= -->
        <!-- Bronze -> sandbox -->
        <line x1="220" y1="290" x2="318" y2="220" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="269" y="246" fill="#22d3ee" font-size="9" text-anchor="middle">copy into sandbox</text>

        <!-- sandbox timeline -> time-travel -->
        <line x1="560" y1="240" x2="658" y2="200" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="609" y="212" fill="#22d3ee" font-size="9" text-anchor="middle">read @ snapshot</text>

        <!-- sandbox -> WAP -->
        <line x1="560" y1="360" x2="658" y2="360" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="609" y="352" fill="#22d3ee" font-size="9" text-anchor="middle">branch off</text>

        <!-- timeline -> rollback -->
        <path d="M 560 360 C 760 470 880 470 978 320" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowheadamber)"/>
        <text x="760" y="488" fill="#f59e0b" font-size="9" text-anchor="middle">rewind head to snapshot_id</text>

        <!-- Orchestrator + verify strip -->
        <rect x="40" y="470" width="1200" height="128" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="70" y="496" fill="#22d3ee" font-size="11" font-weight="600">Orchestration</text>
        <text x="70" y="516" fill="#94a3b8" font-size="9">Airflow DAG: time_travel_nyc_taxi (@daily) · placeholder until productionized (Phase-3)</text>
        <text x="70" y="534" fill="#94a3b8" font-size="9">runs entirely against a sandbox silver table — bronze is never mutated</text>
        <text x="430" y="496" fill="#22d3ee" font-size="11" font-weight="600">Capabilities</text>
        <text x="430" y="516" fill="#94a3b8" font-size="9">snapshot history · VERSION AS OF · WAP branch · rollback_to_snapshot</text>
        <text x="430" y="534" fill="#94a3b8" font-size="9">Spark Connect sc://spark-connect:15002 · Iceberg REST iceberg-rest:8181</text>
        <text x="900" y="496" fill="#22d3ee" font-size="11" font-weight="600">Verify</text>
        <text x="900" y="516" fill="#94a3b8" font-size="9">.history → committed_at, snapshot_id</text>
        <text x="900" y="534" fill="#94a3b8" font-size="9">count(*) at snapshot matches expected row count</text>
        <text x="70" y="572" fill="#22d3ee" font-size="10" font-weight="600">Note:</text>
        <text x="115" y="572" fill="#94a3b8" font-size="9">time-travel &amp; rollback statements are parameterised on a snapshot_id captured from .history</text>
      </svg>
