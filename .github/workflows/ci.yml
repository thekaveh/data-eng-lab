name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-and-unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false          # base CI does not need the Atlas submodule
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
      - name: Lint
        run: uv run ruff check .
      - name: Verify repo structure
        run: uv run python scripts/verify_repo.py --root .
      - name: Unit + static tests (offline)
        run: uv run pytest -m "not infra and not network" -q
      - name: Network tests (pre-warm DuckDB tpch extension)
        run: |
          uv run python -c "import duckdb; c = duckdb.connect(); c.execute('INSTALL tpch'); c.execute('LOAD tpch')"
          uv run pytest -m "network" -q

  docs-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
      - name: Build docs (strict)
        run: uv run --group dev mkdocs build --strict
      - name: Docs build --check (idempotent)
        run: uv run --group dev python scripts/build_docs.py --root . --check
      - name: Docs surface check
        run: uv run --group dev python scripts/check_surfaces.py --root .
      - name: Docs diagram check
        run: uv run --group dev python scripts/check_diagrams.py --root .

  maven-spark-apps:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build + test all Maven Spark apps (scalatest + shade)
        run: |
          for pom in spark-apps/*/pom.xml; do
            echo "::group::$pom"; mvn -q -B -f "$pom" package; echo "::endgroup::"
          done
