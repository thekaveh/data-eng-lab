name: wiki-sync

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scenarios/**/README.md"
      - "spark-apps/**/README.md"
      - "README.md"
      - "scripts/build_wiki.py"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false

      - run: python3 scripts/build_wiki.py

      - name: Push to wiki
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo
          rsync -a --delete --exclude='.git' wiki/ wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push."
          else
            git commit -m "docs: sync wiki from docs/ (${{ github.sha }})"
            git push
          fi
