# data-eng-lab overlay — appended to Atlas's compose invocation via the
# compose_overlays: entry in atlas.consumer.yml (no symlink into services/_user/).
# Relative host paths resolve against the compose project dir (infra/), so
# ../scenarios == <repo>/scenarios. Patches existing Atlas services only.
services:
  airflow-scheduler:
    volumes:
      - ../scenarios:/opt/airflow/dags/data_eng_lab_scenarios:ro
      - ../spark-apps:/opt/airflow/dags/data_eng_lab_spark_apps:ro
      - ../datasets:/opt/data-eng-lab/datasets:ro
      - ../tests/infra/probes:/opt/probes:ro

  airflow-dag-processor:
    volumes:
      - ../scenarios:/opt/airflow/dags/data_eng_lab_scenarios:ro
      - ../spark-apps:/opt/airflow/dags/data_eng_lab_spark_apps:ro

  jupyterhub:
    volumes:
      - ../datasets:/home/jovyan/data-eng-lab/datasets:ro
      - ../tests/infra/probes:/opt/probes:ro
