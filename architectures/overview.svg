<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="ah-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="ah-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="ah-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="ah-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#0a0f1f"/>
  <rect width="1200" height="700" fill="url(#grid)" opacity="0.6"/>

  <!-- Title -->
  <circle cx="24" cy="30" r="6" fill="#22d3ee"/>
  <text x="40" y="35" fill="white" font-size="16" font-weight="700">data-eng-lab — Full-stack Lakehouse</text>
  <text x="40" y="55" fill="#94a3b8" font-size="11">Iceberg lakehouse on MinIO, orchestrated by Airflow, queried by Trino</text>

  <!-- Region boundary (the data-eng-lab platform) -->
  <rect x="15" y="80" width="920" height="545" rx="12" fill="rgba(251,191,36,0.04)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="27" y="98" fill="#fbbf24" font-size="10" font-weight="600">data-eng-lab platform</text>

  <!-- =========== ARROWS (drawn before boxes for z-order) =========== -->

  <!-- Zeppelin → Spark -->
  <line x1="235" y1="155" x2="273" y2="170" stroke="#34d399" stroke-width="1.5" marker-end="url(#ah-emerald)"/>
  <text x="254" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">Scala</text>

  <!-- JupyterHub → Spark -->
  <line x1="235" y1="245" x2="273" y2="215" stroke="#34d399" stroke-width="1.5" marker-end="url(#ah-emerald)"/>
  <text x="254" y="240" fill="#94a3b8" font-size="8" text-anchor="middle">PySpark</text>

  <!-- Airflow → Spark -->
  <line x1="235" y1="335" x2="273" y2="245" stroke="#34d399" stroke-width="1.5" marker-end="url(#ah-emerald)"/>
  <text x="254" y="294" fill="#94a3b8" font-size="8" text-anchor="middle">SparkSubmit</text>

  <!-- Jenkins → MinIO jars/ (publish, curved below) -->
  <path d="M 235 425 Q 500 490 753 365" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-amber)"/>
  <text x="495" y="484" fill="#fbbf24" font-size="8" text-anchor="middle">publish JARs</text>

  <!-- Redpanda → Spark (streaming source) -->
  <path d="M 235 496 Q 265 380 290 273" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ah-orange)"/>
  <text x="244" y="385" fill="#fb923c" font-size="8">streaming</text>

  <!-- Spark → Iceberg REST -->
  <line x1="475" y1="200" x2="513" y2="220" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#ah-violet)"/>
  <text x="494" y="206" fill="#94a3b8" font-size="8" text-anchor="middle">table ops</text>

  <!-- Iceberg REST → Postgres -->
  <line x1="615" y1="280" x2="615" y2="298" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#ah-violet)"/>
  <text x="623" y="293" fill="#94a3b8" font-size="7">metadata</text>

  <!-- Iceberg REST → MinIO lakehouse/ -->
  <line x1="715" y1="230" x2="753" y2="285" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#ah-amber)"/>
  <text x="736" y="246" fill="#94a3b8" font-size="8" text-anchor="middle">s3:// data</text>

  <!-- Trino → Iceberg REST (reads) -->
  <path d="M 475 340 Q 495 280 513 240" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah-violet)"/>
  <text x="480" y="290" fill="#94a3b8" font-size="8">SQL reads</text>

  <!-- Spark → bronze (writes) -->
  <path d="M 375 270 Q 365 400 350 518" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#ah-emerald)"/>
  <text x="346" y="430" fill="#94a3b8" font-size="8">writes</text>

  <!-- Medallion pipeline arrows -->
  <line x1="225" y1="555" x2="253" y2="555" stroke="#fbbf24" stroke-width="2" marker-end="url(#ah-amber)"/>
  <line x1="445" y1="555" x2="473" y2="555" stroke="#fbbf24" stroke-width="2" marker-end="url(#ah-amber)"/>
  <line x1="665" y1="555" x2="693" y2="555" stroke="#fbbf24" stroke-width="2" marker-end="url(#ah-amber)"/>

  <!-- =========== COMPONENT BOXES (on top of arrows) =========== -->

  <!-- Left column: UI / Sources (cyan, frontend category) -->

  <!-- Zeppelin -->
  <rect x="35" y="120" width="200" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="135" y="145" fill="white" font-size="12" font-weight="600" text-anchor="middle">Zeppelin</text>
  <text x="135" y="162" fill="#94a3b8" font-size="9" text-anchor="middle">Scala Spark notebooks</text>
  <text x="135" y="178" fill="#22d3ee" font-size="8" text-anchor="middle">%trino interpreter</text>

  <!-- JupyterHub -->
  <rect x="35" y="210" width="200" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="135" y="235" fill="white" font-size="12" font-weight="600" text-anchor="middle">JupyterHub</text>
  <text x="135" y="252" fill="#94a3b8" font-size="9" text-anchor="middle">PySpark notebooks</text>
  <text x="135" y="268" fill="#22d3ee" font-size="8" text-anchor="middle">Spark Connect</text>

  <!-- Airflow -->
  <rect x="35" y="300" width="200" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="135" y="325" fill="white" font-size="12" font-weight="600" text-anchor="middle">Airflow</text>
  <text x="135" y="342" fill="#94a3b8" font-size="9" text-anchor="middle">DAG orchestration</text>
  <text x="135" y="358" fill="#22d3ee" font-size="8" text-anchor="middle">SparkSubmitOperator</text>

  <!-- Jenkins -->
  <rect x="35" y="390" width="200" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="135" y="415" fill="white" font-size="12" font-weight="600" text-anchor="middle">Jenkins</text>
  <text x="135" y="432" fill="#94a3b8" font-size="9" text-anchor="middle">CI / Maven build</text>
  <text x="135" y="448" fill="#22d3ee" font-size="8" text-anchor="middle">publishes jars/</text>

  <!-- Redpanda message bus -->
  <rect x="35" y="485" width="200" height="22" rx="4" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="135" y="500" fill="#fb923c" font-size="8" font-weight="600" text-anchor="middle">Redpanda (Kafka API :9092)</text>

  <!-- Processing (emerald, backend) -->

  <!-- Spark cluster -->
  <rect x="275" y="140" width="200" height="130" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="375" y="165" fill="white" font-size="12" font-weight="600" text-anchor="middle">Spark Cluster</text>
  <text x="375" y="182" fill="#94a3b8" font-size="9" text-anchor="middle">cluster mode</text>
  <text x="375" y="198" fill="#94a3b8" font-size="9" text-anchor="middle">spark-submit</text>
  <text x="375" y="214" fill="#94a3b8" font-size="9" text-anchor="middle">Structured Streaming</text>
  <text x="375" y="230" fill="#94a3b8" font-size="9" text-anchor="middle">DataFrame / SQL ops</text>
  <text x="375" y="252" fill="#34d399" font-size="8" text-anchor="middle">Iceberg connector</text>

  <!-- Trino -->
  <rect x="275" y="300" width="200" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="375" y="325" fill="white" font-size="12" font-weight="600" text-anchor="middle">Trino</text>
  <text x="375" y="342" fill="#94a3b8" font-size="9" text-anchor="middle">BI / federated SQL</text>
  <text x="375" y="358" fill="#94a3b8" font-size="9" text-anchor="middle">reads Iceberg REST</text>
  <text x="375" y="374" fill="#a78bfa" font-size="8" text-anchor="middle">JDBC :443</text>

  <!-- Catalog (violet, database) -->

  <!-- Iceberg REST catalog -->
  <rect x="515" y="160" width="200" height="120" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="615" y="185" fill="white" font-size="12" font-weight="600" text-anchor="middle">Iceberg REST Catalog</text>
  <text x="615" y="202" fill="#94a3b8" font-size="9" text-anchor="middle">catalog: lakehouse</text>
  <text x="615" y="218" fill="#94a3b8" font-size="9" text-anchor="middle">iceberg-rest:8181</text>
  <text x="615" y="234" fill="#94a3b8" font-size="9" text-anchor="middle">Iceberg 1.11.0</text>
  <text x="615" y="256" fill="#a78bfa" font-size="8" text-anchor="middle">bronze · silver · gold</text>

  <!-- Postgres backend -->
  <rect x="515" y="300" width="200" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="615" y="325" fill="white" font-size="12" font-weight="600" text-anchor="middle">Postgres</text>
  <text x="615" y="342" fill="#94a3b8" font-size="9" text-anchor="middle">Supabase DB</text>
  <text x="615" y="358" fill="#94a3b8" font-size="9" text-anchor="middle">catalog metadata</text>
  <text x="615" y="374" fill="#a78bfa" font-size="8" text-anchor="middle">jdbc:postgresql:5432</text>

  <!-- Storage MinIO (amber, cloud) -->
  <rect x="755" y="120" width="170" height="350" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="840" y="145" fill="white" font-size="12" font-weight="600" text-anchor="middle">MinIO</text>
  <text x="840" y="162" fill="#94a3b8" font-size="9" text-anchor="middle">S3-compatible</text>

  <!-- Bucket sub-rows -->
  <line x1="770" y1="175" x2="910" y2="175" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
  <text x="840" y="195" fill="white" font-size="10" font-weight="600" text-anchor="middle">landing/</text>
  <text x="840" y="210" fill="#94a3b8" font-size="8" text-anchor="middle">raw Parquet/CSV/JSON</text>

  <line x1="770" y1="222" x2="910" y2="222" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
  <text x="840" y="245" fill="white" font-size="10" font-weight="600" text-anchor="middle">lakehouse/</text>
  <text x="840" y="260" fill="#94a3b8" font-size="8" text-anchor="middle">bronze/ silver/ gold</text>
  <text x="840" y="274" fill="#94a3b8" font-size="8" text-anchor="middle">Iceberg tables</text>

  <line x1="770" y1="288" x2="910" y2="288" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
  <text x="840" y="312" fill="white" font-size="10" font-weight="600" text-anchor="middle">jars/</text>
  <text x="840" y="327" fill="#94a3b8" font-size="8" text-anchor="middle">Spark app JARs</text>

  <line x1="770" y1="340" x2="910" y2="340" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
  <text x="840" y="365" fill="white" font-size="10" font-weight="600" text-anchor="middle">checkpoints/</text>
  <text x="840" y="380" fill="#94a3b8" font-size="8" text-anchor="middle">streaming state</text>

  <text x="840" y="455" fill="#fbbf24" font-size="8" text-anchor="middle">s3a:// scheme</text>

  <!-- Medallion pipeline header -->
  <text x="460" y="510" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">Medallion pipeline</text>

  <!-- landing -->
  <rect x="35" y="520" width="190" height="70" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="130" y="545" fill="white" font-size="11" font-weight="600" text-anchor="middle">landing/</text>
  <text x="130" y="562" fill="#94a3b8" font-size="9" text-anchor="middle">raw Parquet/CSV/JSON</text>
  <text x="130" y="578" fill="#94a3b8" font-size="8" text-anchor="middle">external sources</text>

  <!-- bronze -->
  <rect x="255" y="520" width="190" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="350" y="545" fill="white" font-size="11" font-weight="600" text-anchor="middle">bronze</text>
  <text x="350" y="562" fill="#94a3b8" font-size="9" text-anchor="middle">raw ingestion</text>
  <text x="350" y="578" fill="#94a3b8" font-size="8" text-anchor="middle">minimal transform</text>

  <!-- silver -->
  <rect x="475" y="520" width="190" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="570" y="545" fill="white" font-size="11" font-weight="600" text-anchor="middle">silver</text>
  <text x="570" y="562" fill="#94a3b8" font-size="9" text-anchor="middle">dedup + validate</text>
  <text x="570" y="578" fill="#94a3b8" font-size="8" text-anchor="middle">schema-enforced</text>

  <!-- gold -->
  <rect x="695" y="520" width="190" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="790" y="545" fill="white" font-size="11" font-weight="600" text-anchor="middle">gold</text>
  <text x="790" y="562" fill="#94a3b8" font-size="9" text-anchor="middle">business marts</text>
  <text x="790" y="578" fill="#94a3b8" font-size="8" text-anchor="middle">BI / ML ready</text>

  <!-- Footer note -->
  <text x="475" y="645" fill="#475569" font-size="9" text-anchor="middle">data-eng-lab • Orbital theme • landscape</text>

  <!-- =========== LEGEND (outside region, top right) =========== -->
  <rect x="950" y="90" width="235" height="245" rx="8" fill="rgba(15,23,42,0.5)" stroke="#1e293b" stroke-width="1"/>
  <text x="962" y="110" fill="white" font-size="11" font-weight="600">Legend</text>

  <rect x="962" y="122" width="16" height="10" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="984" y="131" fill="#94a3b8" font-size="8">Frontend / UI (notebooks, CI)</text>

  <rect x="962" y="140" width="16" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="984" y="149" fill="#94a3b8" font-size="8">Backend (Spark, Trino)</text>

  <rect x="962" y="158" width="16" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="984" y="167" fill="#94a3b8" font-size="8">Database / Catalog</text>

  <rect x="962" y="176" width="16" height="10" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="984" y="185" fill="#94a3b8" font-size="8">Cloud / Storage (MinIO)</text>

  <rect x="962" y="194" width="16" height="10" rx="2" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1"/>
  <text x="984" y="203" fill="#94a3b8" font-size="8">Message bus (Redpanda)</text>

  <rect x="962" y="212" width="16" height="10" rx="2" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="984" y="221" fill="#94a3b8" font-size="8">External / raw (landing)</text>

  <line x1="962" y1="240" x2="1175" y2="240" stroke="#1e293b" stroke-width="0.5"/>

  <line x1="962" y1="258" x2="982" y2="258" stroke="#34d399" stroke-width="1.5" marker-end="url(#ah-emerald)"/>
  <text x="990" y="261" fill="#94a3b8" font-size="8">data flow</text>

  <line x1="962" y1="278" x2="982" y2="278" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah-violet)"/>
  <text x="990" y="281" fill="#94a3b8" font-size="8">metadata / control</text>

  <line x1="962" y1="298" x2="982" y2="298" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-amber)"/>
  <text x="990" y="301" fill="#94a3b8" font-size="8">artifact publish</text>

  <text x="962" y="322" fill="#475569" font-size="7">data-eng-lab • Orbital theme</text>
</svg>
