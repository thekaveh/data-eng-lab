site_name: data-eng-lab
site_url: https://thekaveh.github.io/data-eng-lab/
site_description: >-
  An Iceberg-lakehouse-on-MinIO data-engineering lab on the Atlas platform —
  Scala/PySpark scenarios, Maven Spark apps, and the full medallion.
repo_url: https://github.com/thekaveh/data-eng-lab
repo_name: thekaveh/data-eng-lab
docs_dir: docs
exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_doc_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
