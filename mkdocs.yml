site_name: data-eng-lab
site_url: https://thekaveh.github.io/data-eng-lab/
site_description: >-
  An Apache Iceberg lakehouse data engineering lab —
   19 Spark scenarios, 2 CI-built Maven apps, Trino BI, Redpanda streaming,
  medallion architecture on Docker Compose.
repo_url: https://github.com/thekaveh/data-eng-lab
repo_name: thekaveh/data-eng-lab
docs_dir: docs
exclude_docs: superpowers/
edit_uri: blob/main/docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
     - scheme: slate
       primary: cyan
       accent: cyan
       toggle:
         icon: material/weather-night
         name: Switch to light mode
     - scheme: default
       primary: cyan
       accent: cyan
       toggle:
         icon: material/weather-sunny
         name: Switch to dark mode
  font:
    text: Inter
    code: IBM Plex Mono
  features:
     - navigation.tabs
     - navigation.sections
     - navigation.top
     - navigation.tracking
     - navigation.instant
     - toc.follow
     - search.suggest
     - search.highlight
     - content.code.copy
     - content.code.annotate
     - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
   - admonition
   - attr_list
   - md_in_html
   - tables
   - toc:
       permalink: true
   - pymdownx.highlight:
       anchor_linenums: true
   - pymdownx.inlinehilite
   - pymdownx.superfences
   - pymdownx.details
   - pymdownx.tabbed:
       alternate_style: true
   - pymdownx.emoji:
       emoji_index: !!python/name:material.extensions.emoji.twemoji
       emoji_generator: !!python/name:material.extensions.emoji.to_svg
   - pymdownx.critic
   - pymdownx.caret
   - pymdownx.keys
   - pymdownx.mark
   - pymdownx.tilde

plugins:
   - search

extra_css:
   - css/custom.css

